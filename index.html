<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>NeuroHues Supabase Connection Test</title>
<style>
body{font-family:Arial,sans-serif;background:#FFF9EA;color:#2F2A1F;max-width:720px;margin:auto;padding:32px}
.card{background:white;border-radius:22px;padding:24px;box-shadow:0 8px 28px rgba(0,0,0,.08)}
button{background:#2F2A1F;color:white;border:0;border-radius:14px;padding:12px 16px;cursor:pointer}
pre{background:#FAF4E1;border-radius:14px;padding:14px;white-space:pre-wrap}
</style>
</head>
<body>
<div class="card">
<h1>NeuroHues Supabase Test</h1>
<p>This file tests whether Amalfi Lemon observations can be submitted to Supabase.</p>

<button onclick="submitTestObservation()">Submit Test Observation</button>

<h2>Status</h2>
<pre id="status">Waiting...</pre>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
const SUPABASE_URL = "https://idjkwenphrxbqnrlgaow.supabase.co";

// Paste your Supabase publishable key between the quotes below.
// It should start with sb_publishable_
const SUPABASE_PUBLISHABLE_KEY = "REPLACE_ME";

const client = supabase.createClient(SUPABASE_URL, SUPABASE_PUBLISHABLE_KEY);

async function submitTestObservation() {
  const status = document.getElementById("status");
  status.textContent = "Submitting...";

  const payload = {
    anonymous_user_id: "browser_test_" + Math.random().toString(36).slice(2),
    color_id: "amalfi_lemon",
    match_score: 97,
    match_check_score: 3,
    seen_in: "Food",
    feels_like: "Fresh",
    response_speed: "Immediate",
    shift: "More Curious",
    memory_word: "lemonade",
    memory_age: "Childhood",
    creative_direction: "Explore",
    creative_direction_other: null
  };

  const { data, error } = await client
    .from("observations")
    .insert([payload])
    .select();

  if (error) {
    status.textContent = "Error:\\n" + JSON.stringify(error, null, 2);
  } else {
    status.textContent = "Success! Observation saved:\\n" + JSON.stringify(data, null, 2);
  }
}
</script>
</body>
</html>
